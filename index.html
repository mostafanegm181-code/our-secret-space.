<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكاتنا السري - متزامن لحظياً</title>
    <style>
        body {
            font-family: 'Cairo', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h2 { margin-bottom: 20px; color: #ffeb3b; }
        .img-box {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 3px solid #ffeb3b;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        button {
            background: #ff5722;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.4);
            margin-top: 15px;
        }
        button:hover {
            background: #e64a19;
            transform: scale(1.05);
        }
        #status-text {
            margin-top: 15px;
            font-size: 16px;
            color: #00e676;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>مكاتنا السري والمتزامن 🚀</h2>
        
        <!-- مكان الصورة (حط رابط صورتك هنا أو اسم ملف الصورة لو في نفس الفولدر) -->
        <div class="img-box">
            <img id="my-image" src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23" alt="صورة المكان">
        </div>

        <p>اضغط الزرار ده، وشوف الجهاز التاني هيحس بيك ويسمع في نفس اللحظة ولا لأ!</p>
        
        <button onclick="changeAction()">اضغط هنا للتزامن!</button>
        
        <div id="status-text">متصل بالسيرفر وجاهز...</div>
    </div>

    <!-- كود ربط فايربيز السحابي المدمج -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRZwfL46dhupo4RRHQ8Remq_g2oyFZbbC4",
            authDomain: "our-secret-space-1b6f5.firebaseapp.com",
            databaseURL: "https://our-secret-space-1b6f5-default-rtdb.firebaseio.com",
            projectId: "our-secret-space-1b6f5",
            storageBucket: "our-secret-space-1b6f5.firebasestorage.app",
            messagingSenderId: "944417168285",
            appId: "1:944417168285:web:13se40e00534858ade6d74"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const statusRef = ref(db, 'actionStatus');

        // دالة بتشتغل لما تضغط على الزرار وترسل السيرفر
        window.changeAction = function() {
            const randomMsg = "تم الضغط على الزرار بواسطة أحد الأجهزة الساعة " + new Date().toLocaleTimeString();
            set(statusRef, randomMsg);
        };

        // استقبال التحديثات لحظياً على أي جهاز تاني فاتح الصفحة
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('status-text').innerText = data;
                // هنا ممكن تخليه يظهر إشعار صوتي أو يغير الشكل لحظياً
                if(navigator.vibrate) navigator.vibrate(200); // اهتزاز بسيط للموبايل لو مدعوم
            }
        });
    </script>

</body>
</html>
